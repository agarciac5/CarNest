services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carnest
      POSTGRES_USER: carnest
      POSTGRES_PASSWORD: carnest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carnest -d carnest"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: carnest
      POSTGRES_USER: carnest
      POSTGRES_PASSWORD: carnest
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
