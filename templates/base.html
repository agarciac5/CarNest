{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CarNest{% endblock %}</title>

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">CarNest</a>

                <div class="d-flex align-items-center gap-2">
            <a href="/inventario/" class="btn btn-outline-light btn-sm">Vehículos</a>
            {% if user.is_authenticated and user.is_staff %}
                <a href="/anuncios/" class="btn btn-outline-light btn-sm">Anuncios</a>
            {% endif %}

                    {% if request.user.is_authenticated %}

         
                <a href="/carrito/" class="btn btn-outline-light btn-sm">
                    <img src="{% static 'img/carrito.png' %}" width="20">
                </a>

  
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        {{ request.user.username }}
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <li>
                                <form action="{% url 'logout' %}" method="post">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item">
                                        Cerrar sesión
                                    </button>
                                </form>
                            </li>
                        </li>
                    </ul>
                </div>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                <a href="{% url 'registro' %}" class="btn btn-outline-light btn-sm">Registro</a>

            {% endif %}
        </div>
    </div>
</nav>


<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
